name: CI
on:
  push:
    branches: [main]
  pull_request: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # gitleaks BINARY (free / open source) — the gitleaks-action wrapper now
      # requires a paid license for org repos; the CLI does not. Runs before
      # `npm ci` so it scans only tracked source, not node_modules.
      - name: Secret scan (public registry hygiene)
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gl.tgz
          tar -xzf /tmp/gl.tgz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --no-banner --exit-code 1
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run registry:build
      - name: Materialized theme must not be stale
        run: git diff --exit-code src/registry/crashoverride/theme/tokens.css
      - run: npx vitest run

  # axe accessibility smoke-check: runs the Storybook test runner against the
  # real static build, with the a11y addon in `test: error` mode so axe
  # violations FAIL story tests. Radix supplies the interaction semantics; this
  # keeps the rendered, themed output honest (names, roles, contrast).
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build-storybook
      - name: Serve storybook-static
        run: npx http-server storybook-static -p 6006 -s &
      - run: npx wait-on http://127.0.0.1:6006
      - run: npm run test:storybook -- --url http://127.0.0.1:6006
