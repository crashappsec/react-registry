<!-- @dsCard group="Colors" viewport="700x170" name="Surface & Status" subtitle="Phosphor-dark surface, hairline border, semantic status hues" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-primary); font-family: var(--font-mono); padding: 20px; color: var(--text-secondary); }
  .grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 12px; }
  .tile { border: 1px solid var(--border-hairline); border-radius: var(--radius-md); padding: 12px; min-height: 96px; display: flex; flex-direction: column; justify-content: space-between; }
  .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-tertiary); }
  .hex { font-size: 11px; color: var(--text-primary); font-weight: 600; }
  .chip { width: 26px; height: 26px; border-radius: var(--radius-xs); border: 1px solid var(--border-hairline); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile" style="background:var(--color-dark-surface)">
      <div class="lbl">surface · the one background</div>
      <div class="hex">#161616</div>
    </div>
    <div class="tile">
      <span class="lbl">success</span>
      <span class="chip" style="background:var(--color-neon-400)"></span>
      <span class="hex">neon-400</span>
    </div>
    <div class="tile">
      <span class="lbl">warning</span>
      <span class="chip" style="background:var(--color-amber-400)"></span>
      <span class="hex">Fandango</span>
    </div>
    <div class="tile">
      <span class="lbl">error</span>
      <span class="chip" style="background:var(--color-red-800)"></span>
      <span class="hex">red-800</span>
    </div>
  </div>
</body>
</html>
